<button
  #btnContainer
  [attr.aria-label]="ariaLabel() || text()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
  [style.background]="color()"
  class="relative aspect-square min-w-30 max-w-62.5 px-15 flex items-center justify-center rounded-full border border-white/20 shadow-xl transition-all duration-300 ease-out cursor-pointer perspective-stage group select-none"
>
  <div class="absolute inset-0 rounded-full bg-linear-to-tr from-black/20 to-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

  <div
    #textWrapper
    class="absolute inset-0 flex items-center justify-center pointer-events-none transform-style-3d w-full h-full"
  >
    @for (char of chars(); track $index) {
      <span
        #letter
        class="absolute font-sans text-sm md:text-base font-bold tracking-widest text-white uppercase backface-hidden will-change-transform"
      >
        {{ char }}
      </span>
    }
  </div>
</button>
