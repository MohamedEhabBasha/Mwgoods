<main
  #mainIntroStructure
  class="absolute inset-0 bg-transparent grid grid-cols-1 md:grid-cols-3 min-h-screen w-full"
>
  <!--   <app-pixi-web
    class="pointer-events-none"
    [squareSize]="350"
    [thickness]="0.8"
    backgroundColor="#fff"
  ></app-pixi-web> -->
  <div
    #leftColumn
    class="relative bg-white text-white flex items-end justify-center p-6 md:items-center overflow-hidden"
  >
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-px bg-neutral-300 pointer-events-none"
    ></div>

    <img
      #targetLeftImg
      src="home\kill.png"
      alt="Kill the Standard Storefront"
      class="absolute bottom-[24%] w-35 h-auto object-cover hidden lg:block xl:w-30 xl:bottom-[27%]"
    />

    <h2
      [ngClass]="'text-accent-red text-4xl lg:text-5xl xl:text-7xl font-bold uppercase font-OpenSans tracking-tighter 
    mt-10 md:mt-0 xl:ml-16 z-20'"
    >
      Kill
    </h2>
  </div>

  <div #centerColumn class="relative bg-white text-white flex items-center justify-center border border-neutral-300">
    <p #targetCenterText class="px-6 py-10 text-lg md:text-xl font-light text-zinc-400 border-y border-neutral-300">
      Traditional e-commerce is dead quiet. We turned it into a live arena. Broadcast your build
      process, drop rare assets in real-time, and own your audience equity without the middleman
      taxing your vision.
    </p>
    <img
      #targetRightImg
      src="home\head-intro.png"
      alt="Kill the Standard Storefront"
      class="absolute right-[1%] bottom-[17%] w-40 h-auto object-cover hidden lg:block xl:right-[3%] xl:bottom-[21%]"
    />
  </div>

  <div
    #rightColumn
    class="relative bg-white text-white flex flex-col items-center justify-center p-6 md:justify-end overflow-visible"
  >
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-px bg-neutral-300 pointer-events-none z-0"
    ></div>
    <h2
      class="text-4xl lg:text-5xl xl:text-6xl font-bold font-OpenSans text-[#333] uppercase text-center md:text-left tracking-[0.1rem]"
    >
      the
      <br class="hidden md:block" />
      Standard Storefront
    </h2>
    <button
      [ngClass]="`
          px-6 py-3 md:px-8 md:py-4 rounded-full border border-stone-700
          bg-stone-900 hover:bg-stone-100 text-stone-100 hover:text-stone-950
          text-xs lg:text-sm tracking-widest font-medium uppercase
           pointer-events-auto mt-10 md:mb-30 md:mt-0 md:order-first xl:ml-12 z-10
        `"
    >
      Get Started
    </button>
  </div>
</main>
