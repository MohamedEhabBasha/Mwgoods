# This file was auto-generated by the Firebase CLI and modified for direct push deployments
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on Push
on:
  push:
    branches:
      - main     # Change this to 'master' if your default branch is named master

permissions:
  checks: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies and build Angular app
        run: npm ci && npm run build
        
      - name: Deploy to Firebase Hosting Live Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MWGOODS }}
          projectId: mwgoods
          channelId: live  # This tells the action to update your actual live website